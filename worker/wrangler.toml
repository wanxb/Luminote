name = "luminote-api"
main = "src/index.ts"
compatibility_date = "2026-04-02"

[vars]
SITE_TITLE = "Luminote"
WATERMARK_ENABLED_BY_DEFAULT = "true"
WATERMARK_TEXT = "© Luminote"
ADMIN_PASSWORD = "changeme"
ADMIN_SESSION_TOKEN = "local-dev-admin-token"
CORS_ALLOWED_ORIGINS = "https://luminote.wtg2021.workers.dev"
ADMIN_COOKIE_SAME_SITE = "None"
ADMIN_COOKIE_SECURE = "true"

[[d1_databases]]
binding = "DB"
database_name = "luminote-prod"
database_id = "3a982772-65fe-4019-8031-d77a97d1231d"

# Add a real R2 binding before enabling object storage:
[[r2_buckets]]
binding = "luminote_assets"
bucket_name = "luminote-assets"
