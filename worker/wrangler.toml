name = "luminote-api"
main = "src/index.ts"
compatibility_date = "2026-04-02"

[vars]
SITE_TITLE = "Luminote"
WATERMARK_ENABLED_BY_DEFAULT = "true"
WATERMARK_TEXT = "© Luminote"
ADMIN_PASSWORD = "changeme"
ADMIN_SESSION_TOKEN = "local-dev-admin-token"

[[d1_databases]]
binding = "DB"
database_name = "luminote-dev"
database_id = "5e05e500-52f8-4243-a837-1066c3c95082"
remote = true

# Add a real R2 binding before enabling object storage:
[[r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "luminote-dev"
remote = true
