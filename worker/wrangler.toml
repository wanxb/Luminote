name = "luminote-api-local"
main = "src/index.ts"
compatibility_date = "2026-04-02"
workers_dev = true

[vars]
SITE_TITLE = "Luminote"
WATERMARK_ENABLED_BY_DEFAULT = "true"
WATERMARK_TEXT = "@Luminote"
CORS_ALLOWED_ORIGINS = "http://localhost:3000"
ADMIN_COOKIE_SAME_SITE = "Lax"
ADMIN_COOKIE_SECURE = "false"

[[d1_databases]]
binding = "DB"
database_name = "luminote-dev"
database_id = "00000000-0000-0000-0000-000000000000"

[[r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "luminote-dev"
